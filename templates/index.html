<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogWatcher KB Editor by DFT.one</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --border2: #2e3447;
    --text: #c8d0e4;
    --text-dim: #5c6580;
    --text-muted: #3a3f55;
    --accent: #4f7fff;
    --accent-glow: rgba(79,127,255,0.18);
    --green: #3ecf8e;
    --yellow: #f5c842;
    --red: #f5424e;
    --orange: #ff7c3a;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo-mark {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--accent);
    display: grid; place-items: center;
    font-family: var(--sans); font-weight: 800; font-size: 15px; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .title-block h1 {
    font-family: var(--sans); font-size: 17px; font-weight: 700; letter-spacing: 0.02em; color: #fff;
  }
  .title-block p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  #save-status {
    font-size: 11px; color: var(--text-dim);
    opacity: 0; transition: opacity 0.4s;
    display: flex; align-items: center; gap: 6px;
  }
  #save-status.show { opacity: 1; }
  #save-status .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Toolbar ── */
  .toolbar {
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--surface);
  }

  .toolbar-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }

  .sort-btn {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: var(--mono);
    font-size: 11px; display: flex; align-items: center; gap: 6px;
    transition: all 0.15s; white-space: nowrap;
  }
  .sort-btn:hover { border-color: var(--accent); color: #fff; }
  .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 14px var(--accent-glow); }
  .sort-arrow { font-size: 10px; opacity: 0.7; }

  .filter-group { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .sev-filter {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text-dim); font-size: 11px;
    font-family: var(--mono); cursor: pointer; transition: all 0.15s;
  }
  .sev-filter.active-INFO { border-color: var(--green); color: var(--green); background: rgba(62,207,142,0.08); }
  .sev-filter.active-WARNING { border-color: var(--yellow); color: var(--yellow); background: rgba(245,200,66,0.08); }
  .sev-filter.active-CRITICAL { border-color: var(--red); color: var(--red); background: rgba(245,66,78,0.08); }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 120px); }

  /* ── Entry list ── */
  .entry-list {
    width: 420px; flex-shrink: 0;
    overflow-y: auto; border-right: 1px solid var(--border);
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }

  .entry-card {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.12s;
    position: relative;
  }
  .entry-card:hover { background: var(--surface); }
  .entry-card.selected { background: var(--surface2); border-left: 2px solid var(--accent); padding-left: 18px; }

  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }

  .entry-id {
    font-size: 10px; color: var(--text-muted); font-weight: 500;
    background: var(--surface2); padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--border);
  }

  .sev-badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .sev-INFO    { background: rgba(62,207,142,0.12); color: var(--green); border: 1px solid rgba(62,207,142,0.25); }
  .sev-WARNING { background: rgba(245,200,66,0.12); color: var(--yellow); border: 1px solid rgba(245,200,66,0.25); }
  .sev-CRITICAL{ background: rgba(245,66,78,0.12);  color: var(--red);    border: 1px solid rgba(245,66,78,0.25); }

  .card-count { margin-left: auto; font-size: 11px; color: var(--text-dim); }
  .card-count span { color: var(--text); font-weight: 600; }

  .card-msg {
    font-size: 11.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.5;
  }

  .card-confidence {
    margin-top: 7px; display: flex; align-items: center; gap: 8px;
  }
  .conf-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .conf-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .conf-label { font-size: 10px; color: var(--text-dim); white-space: nowrap; }

  /* ── Detail panel ── */
  .detail-panel {
    flex: 1; overflow-y: auto; padding: 28px 36px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }

  .no-selection {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; color: var(--text-muted); text-align: center;
  }
  .no-selection .icon { font-size: 48px; opacity: 0.3; }
  .no-selection p { font-size: 13px; line-height: 1.7; }

  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .detail-header h2 { font-family: var(--sans); font-size: 20px; font-weight: 700; color: #fff; }
  .detail-header .sev-badge { font-size: 11px; padding: 4px 10px; }

  .section { margin-bottom: 24px; }
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-dim); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Fields */
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-grid.full { grid-template-columns: 1fr; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }

  .field input, .field textarea, .field select {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    padding: 9px 12px; border-radius: var(--radius); font-family: var(--mono); font-size: 12px;
    transition: border-color 0.15s, box-shadow 0.15s; width: 100%; resize: vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field select option { background: var(--surface2); }

  .field textarea { min-height: 70px; line-height: 1.6; }
  .field textarea.tall { min-height: 110px; }

  /* Entities */
  .entities-wrap { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .entity-tag {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    padding: 4px 10px; border-radius: 20px; font-size: 11px;
    display: flex; align-items: center; gap: 6px;
  }
  .entity-remove {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0; transition: color 0.15s;
  }
  .entity-remove:hover { color: var(--red); }
  .entity-add-wrap { display: flex; gap: 8px; margin-top: 6px; width: 100%; }
  .entity-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 6px; padding: 6px 10px; font-family: var(--mono); font-size: 12px;
    color: var(--text); transition: border-color 0.15s;
  }
  .entity-input:focus { outline: none; border-color: var(--accent); }
  .btn-add {
    background: none; border: 1px solid var(--border2); color: var(--text-dim);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: var(--mono);
    font-size: 11px; transition: all 0.15s;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* Actions */
  .action-bar { display: flex; gap: 10px; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }

  .btn-save {
    background: var(--accent); color: #fff; border: none;
    padding: 10px 22px; border-radius: var(--radius); cursor: pointer;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    transition: all 0.15s; box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn-save:hover { background: #6b91ff; box-shadow: 0 0 30px var(--accent-glow); }
  .btn-save:active { transform: scale(0.98); }

  .btn-reset {
    background: none; border: 1px solid var(--border2); color: var(--text-dim);
    padding: 10px 18px; border-radius: var(--radius); cursor: pointer;
    font-family: var(--mono); font-size: 12px; transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--text-dim); color: var(--text); }

  /* Confidence slider */
  .conf-field { display: flex; flex-direction: column; gap: 5px; }
  .conf-field label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .conf-slider-row { display: flex; align-items: center; gap: 12px; }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--accent) var(--pct,50%), var(--border2) var(--pct,50%));
    outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent-glow);
  }
  .conf-val {
    font-size: 13px; font-weight: 600; color: var(--accent); width: 24px; text-align: right;
  }

  /* Count badge area */
  .count-field { display: flex; flex-direction: column; gap: 5px; }
  .count-input-wrap { position: relative; }
  .count-input-wrap input { padding-right: 60px; }
  .count-unit { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--text-muted); }

  /* Scrollbar styles */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Empty state */
  .empty-list { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 12px; }

  .title-block h1 { font-size: 19px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); padding: 12px 18px; border-radius: var(--radius);
    font-size: 12px; display: flex; align-items: center; gap: 10px;
    opacity: 0; transform: translateY(10px); transition: all 0.25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast .t-icon { font-size: 15px; }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>LogWatcher <span style="color:var(--accent)">KB Editor</span></h1>
    <p>by DFT.one</p>
  </div>
  <div class="header-right">
    <div id="save-status"><div class="dot"></div> Saved</div>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Sort by</span>
  <button class="sort-btn active" data-field="id" onclick="setSort('id')">
    # ID <span class="sort-arrow" id="arrow-id">↑</span>
  </button>
  <button class="sort-btn" data-field="count" onclick="setSort('count')">
    Count <span class="sort-arrow" id="arrow-count"></span>
  </button>
  <button class="sort-btn" data-field="severity" onclick="setSort('severity')">
    Severity <span class="sort-arrow" id="arrow-severity"></span>
  </button>
  <button class="sort-btn" data-field="confidence" onclick="setSort('confidence')">
    Confidence <span class="sort-arrow" id="arrow-confidence"></span>
  </button>

  <div class="filter-group">
    <span class="toolbar-label">Filter</span>
    <button class="sev-filter" data-sev="INFO" onclick="toggleFilter('INFO')">INFO</button>
    <button class="sev-filter" data-sev="WARNING" onclick="toggleFilter('WARNING')">WARNING</button>
    <button class="sev-filter" data-sev="CRITICAL" onclick="toggleFilter('CRITICAL')">CRITICAL</button>
  </div>
</div>

<div class="main">
  <div class="entry-list" id="entry-list"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="no-selection">
      <div class="icon">⟡</div>
      <p>Select a log pattern from the list<br>to view and edit its details.</p>
    </div>
  </div>
</div>

<div id="toast"><span class="t-icon">✓</span> <span id="toast-msg">Saved</span></div>

<script>
let entries = [];
let selected = null;
let originalEntry = null;
let sortField = 'id';
let sortDir = 1;
let activeFilters = new Set();

async function load() {
  const res = await fetch('/api/entries');
  entries = await res.json();
  renderList();
}

function getConfColor(v) {
  if (v >= 8) return '#3ecf8e';
  if (v >= 5) return '#f5c842';
  return '#f5424e';
}

function renderList() {
  const list = document.getElementById('entry-list');
  let data = [...entries];

  if (activeFilters.size > 0) {
    data = data.filter(e => activeFilters.has(e.severity));
  }

  data.sort((a, b) => {
    let av = sortField === 'confidence' ? a.analysis.confidence_score : a[sortField];
    let bv = sortField === 'confidence' ? b.analysis.confidence_score : b[sortField];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });

  if (!data.length) {
    list.innerHTML = '<div class="empty-list">No entries match current filters.</div>';
    return;
  }

  list.innerHTML = data.map(e => {
    const conf = e.analysis.confidence_score;
    const confColor = getConfColor(conf);
    const isSelected = selected && selected.id === e.id;
    return `<div class="entry-card${isSelected ? ' selected' : ''}" onclick="selectEntry(${e.id})">
      <div class="card-top">
        <span class="entry-id">#${e.id}</span>
        <span class="sev-badge sev-${e.severity}">${e.severity}</span>
        <span class="card-count">×<span>${e.count}</span></span>
      </div>
      <div class="card-msg" title="${e.original_message.replace(/"/g,'&quot;')}">${escHtml(e.original_message)}</div>
      <div class="card-confidence">
        <div class="conf-bar"><div class="conf-fill" style="width:${conf*10}%;background:${confColor}"></div></div>
        <span class="conf-label" style="color:${confColor}">conf ${conf}/10</span>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setSort(field) {
  if (sortField === field) { sortDir *= -1; }
  else { sortField = field; sortDir = 1; }

  document.querySelectorAll('.sort-btn').forEach(b => {
    b.classList.remove('active');
    const f = b.dataset.field;
    document.getElementById('arrow-' + f).textContent = '';
  });
  const btn = document.querySelector(`[data-field="${field}"]`);
  btn.classList.add('active');
  document.getElementById('arrow-' + field).textContent = sortDir === 1 ? '↑' : '↓';
  renderList();
}

function toggleFilter(sev) {
  if (activeFilters.has(sev)) activeFilters.delete(sev);
  else activeFilters.add(sev);

  document.querySelectorAll('.sev-filter').forEach(b => {
    const s = b.dataset.sev;
    b.className = 'sev-filter' + (activeFilters.has(s) ? ' active-' + s : '');
  });
  renderList();
}

function selectEntry(id) {
  selected = JSON.parse(JSON.stringify(entries.find(e => e.id === id)));
  originalEntry = JSON.parse(JSON.stringify(selected));
  renderList();
  renderDetail();
}

function renderDetail() {
  const e = selected;
  if (!e) return;
  const conf = e.analysis.confidence_score;
  const confColor = getConfColor(conf);

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <div class="detail-header">
      <h2>Entry #${e.id}</h2>
      <span class="sev-badge sev-${e.severity}">${e.severity}</span>
    </div>

    <div class="section">
      <div class="section-label">Core Fields</div>
      <div class="field-grid">
        <div class="field">
          <label>Severity</label>
          <select id="f-severity" onchange="updateField('severity', this.value)">
            <option ${e.severity==='INFO'?'selected':''}>INFO</option>
            <option ${e.severity==='WARNING'?'selected':''}>WARNING</option>
            <option ${e.severity==='CRITICAL'?'selected':''}>CRITICAL</option>
          </select>
        </div>
        <div class="count-field field">
          <label>Occurrence Count</label>
          <div class="count-input-wrap">
            <input type="number" id="f-count" value="${e.count}" min="0" onchange="updateField('count', parseInt(this.value)||0)">
            <span class="count-unit">events</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Messages</div>
      <div class="field-grid full">
        <div class="field">
          <label>Original Message</label>
          <textarea id="f-original" class="tall" onchange="updateField('original_message', this.value)">${escHtml(e.original_message)}</textarea>
        </div>
        <div class="field">
          <label>Pattern Message</label>
          <textarea id="f-pattern" class="tall" onchange="updateField('pattern_message', this.value)">${escHtml(e.pattern_message)}</textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Analysis</div>
      <div class="field-grid full">
        <div class="conf-field">
          <label>Confidence Score</label>
          <div class="conf-slider-row">
            <input type="range" min="0" max="10" value="${conf}"
              style="--pct:${conf*10}%; accent-color:${confColor}"
              id="f-conf"
              oninput="
                this.style.setProperty('--pct', this.value*10+'%');
                document.getElementById('conf-display').textContent=this.value;
                document.getElementById('conf-display').style.color=getConfColor(+this.value);
                updateNested('analysis','confidence_score',+this.value);
              ">
            <span class="conf-val" id="conf-display" style="color:${confColor}">${conf}</span>
          </div>
        </div>
        <div class="field" style="margin-top:12px">
          <label>Reasoning</label>
          <textarea id="f-reasoning" onchange="updateNested('analysis','reasoning',this.value)">${escHtml(e.analysis.reasoning)}</textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Detected Entities</div>
      <div class="entities-wrap" id="entities-wrap">
        ${e.analysis.detected_entities.map((ent, i) =>
          `<span class="entity-tag">${escHtml(ent)}<button class="entity-remove" onclick="removeEntity(${i})" title="Remove">×</button></span>`
        ).join('')}
      </div>
      <div class="entity-add-wrap">
        <input class="entity-input" id="new-entity" placeholder="Add entity…" onkeydown="if(event.key==='Enter')addEntity()">
        <button class="btn-add" onclick="addEntity()">+ Add</button>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-save" onclick="saveEntry()">Save Changes</button>
      <button class="btn-reset" onclick="resetEntry()">Reset</button>
    </div>
  `;
}

function updateField(key, value) {
  selected[key] = value;
}

function updateNested(obj, key, value) {
  selected[obj][key] = value;
}

function removeEntity(index) {
  selected.analysis.detected_entities.splice(index, 1);
  renderDetail();
}

function addEntity() {
  const inp = document.getElementById('new-entity');
  const val = inp.value.trim();
  if (!val) return;
  selected.analysis.detected_entities.push(val);
  inp.value = '';
  renderDetail();
}

function resetEntry() {
  selected = JSON.parse(JSON.stringify(originalEntry));
  renderDetail();
  renderList();
}

async function saveEntry() {
  const res = await fetch('/api/entries/' + selected.id, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(selected)
  });
  const data = await res.json();
  if (data.success) {
    const idx = entries.findIndex(e => e.id === selected.id);
    entries[idx] = JSON.parse(JSON.stringify(selected));
    originalEntry = JSON.parse(JSON.stringify(selected));
    renderList();
    renderDetail();
    showSaved();
  }
}

function showSaved() {
  const s = document.getElementById('save-status');
  s.classList.add('show');
  setTimeout(() => s.classList.remove('show'), 2500);

  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = 'Entry #' + selected.id + ' saved successfully';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

load();
